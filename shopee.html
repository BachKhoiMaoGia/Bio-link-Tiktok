    <style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    min-height: 100vh;
    background: #0c0c1d;
    color: #fff;
    overflow-x: hidden;
}

/* Background */
.bg-orbs { position:fixed; top:0; left:0; right:0; bottom:0; z-index:0; overflow:hidden; pointer-events:none; }
.orb { position:absolute; border-radius:50%; filter:blur(100px); opacity:0.4; }
.orb-1 { width:350px; height:350px; background:#667eea; top:-80px; left:-60px; animation:drift 12s ease-in-out infinite alternate; }
.orb-2 { width:300px; height:300px; background:#ee4d2d; bottom:-60px; right:-80px; animation:drift 10s ease-in-out infinite alternate-reverse; }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-20px) scale(1.05)} 100%{transform:translate(-10px,10px) scale(1)} }

/* Header */
.header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(12,12,29,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
}
.back-btn {
    display: flex; align-items: center; gap: 6px;
    color: rgba(255,255,255,0.7); text-decoration: none;
    font-size: 14px; font-weight: 500;
    transition: color 0.2s;
}
.back-btn:hover { color: #fff; }
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.header-count { font-size: 12px; color: rgba(255,255,255,0.5); }

/* Category Tabs */
.tabs {
    position: sticky; top: 52px; z-index: 99;
    background: rgba(12,12,29,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 10px 16px;
    display: flex; gap: 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer; transition: all 0.3s;
    white-space: nowrap;
}
.tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
.tab.active {
    background: linear-gradient(135deg, #ee4d2d, #ff6633);
    color: #fff; border-color: transparent;
    box-shadow: 0 2px 12px rgba(238,77,45,0.3);
}
.tab .count {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 11px;
    margin-left: 4px;
}

/* Content */
.content { position: relative; z-index: 1; padding: 16px; max-width: 800px; margin: 0 auto; }

/* Category Section */
.category { margin-bottom: 28px; }
.category-title {
    font-size: 18px; font-weight: 700;
    margin-bottom: 14px;
    padding-left: 4px;
    display: flex; align-items: center; gap: 8px;
}
.category-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 20px;
    border-radius: 2px;
    background: linear-gradient(135deg, #ee4d2d, #ff6633);
}

/* Product Grid */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}

.product-card {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column;
}
.product-card:hover {
    transform: translateY(-3px);
    border-color: rgba(238,77,45,0.4);
    box-shadow: 0 8px 24px rgba(238,77,45,0.15);
}
.product-card:active {
    transform: scale(0.97);
}

.product-img-wrap {
    position: relative;
    width: 100%; padding-top: 100%;
    background: rgba(255,255,255,0.03);
    overflow: hidden;
}
.product-img {
    position: absolute; top:0; left:0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
}
.product-card:hover .product-img { transform: scale(1.05); }

.product-info {
    padding: 10px 12px 12px;
    flex: 1;
    display: flex; flex-direction: column;
}
.product-name {
    font-size: 12px; font-weight: 500;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: rgba(255,255,255,0.9);
    flex: 1;
}
.product-buy {
    margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px;
    border-radius: 8px;
    background: linear-gradient(135deg, #ee4d2d, #ff6633);
    font-size: 11px; font-weight: 700;
    color: #fff;
    transition: opacity 0.2s;
}
.product-buy:hover { opacity: 0.85; }
.product-buy svg { width: 12px; height: 12px; }

/* Loading placeholder */
.product-img-wrap .placeholder {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(110deg, rgba(255,255,255,0.03) 30%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 70%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Footer */
.shop-footer {
    text-align: center;
    padding: 20px 16px 32px;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
}

/* In-app banner */
.inapp-banner {
    background: rgba(255, 193, 7, 0.15);
    border: 1px solid rgba(255, 193, 7, 0.3);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 0 16px 8px;
    font-size: 13px;
    color: #ffd54f;
    line-height: 1.5;
}

@media (max-width: 380px) {
    .products { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .product-info { padding: 8px 8px 10px; }
}
    </style>

    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isAndroid = /android/i.test(navigator.userAgent);
    function isInAppBrowser() {
        return /musical_ly|tiktok|bytedancewebview|instagram|fbav|fban|zalo/i.test(navigator.userAgent);
    }

    if (isInAppBrowser() && isIOS) {
        document.getElementById('inappBanner').style.display = 'block';
    }

    // Build tabs
    var tabsEl = document.getElementById('tabsContainer');
    var allTab = document.createElement('div');
    allTab.className = 'tab active';
    allTab.textContent = 'Tất cả';
    allTab.onclick = function() { showCategory(-1); };
    tabsEl.appendChild(allTab);

    var totalItems = 0;
    CATEGORIES.forEach(function(cat, i) {
        totalItems += cat.items.length;
        var tab = document.createElement('div');
        tab.className = 'tab';
        tab.innerHTML = cat.name + ' <span class="count">' + cat.items.length + '</span>';
        tab.onclick = function() { showCategory(i); };
        tabsEl.appendChild(tab);
    });
    document.getElementById('totalCount').textContent = totalItems + ' sản phẩm';

    function showCategory(idx) {
        // Update active tab
        var tabs = tabsEl.querySelectorAll('.tab');
        tabs.forEach(function(t, i) { t.classList.toggle('active', i === idx + 1); });

        var content = document.getElementById('contentContainer');
        content.innerHTML = '';

        var catsToShow = idx === -1 ? CATEGORIES : [CATEGORIES[idx]];
        catsToShow.forEach(function(cat) {
            var section = document.createElement('div');
            section.className = 'category';
            section.innerHTML = '<div class="category-title">' + cat.name + '</div>';
            var grid = document.createElement('div');
            grid.className = 'products';

            cat.items.forEach(function(item) {
                var card = document.createElement('a');
                card.className = 'product-card';
                card.href = item.shortUrl;
                card.onclick = function(e) { openProduct(item.url, item.shortUrl, e); };

                card.innerHTML =
                    '<div class="product-img-wrap">' +
                        '<div class="placeholder"></div>' +
                        '<img class="product-img" loading="lazy" alt="" src="' + item.image + '" onload="this.previousElementSibling.style.display=\'none\'" onerror="this.previousElementSibling.style.display=\'none\';this.style.display=\'none\'">' +
                    '</div>' +
                    '<div class="product-info">' +
                        '<div class="product-name">' + item.name + '</div>' +
                        '<div class="product-buy">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>' +
                            'Mua ngay' +
                        '</div>' +
                    '</div>';
                grid.appendChild(card);
            });

            section.appendChild(grid);
            content.appendChild(section);
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openProduct(resolvedUrl, shortUrl, event) {
        if (event) event.preventDefault();
        var url = resolvedUrl || shortUrl;

        if (isInAppBrowser()) {
            if (isAndroid) {
                var intentUrl = 'intent://' + url.replace(/^https?:\/\//, '') +
                    '#Intent;scheme=https;package=com.android.chrome;end';
                window.location.href = intentUrl;
                setTimeout(function() { window.location.href = url; }, 500);
            } else {
                window.location.href = url;
            }
        } else {
            if (isAndroid) {
                // Try Shopee app intent with fallback to web
                var shopeeUrl = url.startsWith('https://shopee.vn') ? url : shortUrl;
                var intentShopee = 'intent://' + shopeeUrl.replace(/^https?:\/\//, '') +
                    '#Intent;scheme=https;package=com.shopee.vn;S.browser_fallback_url=' +
                    encodeURIComponent(shopeeUrl) + ';end';
                window.location.href = intentShopee;
            } else if (isIOS) {
                // Shopee Universal Links will handle if app installed
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }
    }

    // Show all categories initially
    showCategory(-1);
    </script>
