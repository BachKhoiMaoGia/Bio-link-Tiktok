<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
    // GitHub Pages SPA routing: /shopee/slug → shopee.html?cat=slug
    (function() {
        var path = location.pathname;
        var repoBase = '/TieuBachMao/';
        var isGithubProjectSite = location.hostname.indexOf('github.io') !== -1 && path.indexOf(repoBase) === 0;
        var base = isGithubProjectSite ? repoBase : '/';
        var rel = isGithubProjectSite ? path.slice(repoBase.length) : path.replace(/^\//, '');
        // Match: shopee/some-slug or shopee/some-slug/
        var m = rel.match(/^shopee\/([^/]+)\/?$/);
        if (m) {
            location.replace(base + 'shopee.html?slug=' + encodeURIComponent(m[1]));
        } else {
            // Unknown path → redirect to home
            location.replace(base);
        }
    })();
    </script>
</head>
<body></body>
</html>
